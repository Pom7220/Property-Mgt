<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PropertyMgt" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />

    <title>Property Management</title>
    <!-- GitHub Pages SPA routing: restore path from redirect -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle ?p= style redirects from 404.html
        var search = location.search;
        if (search.indexOf('?p=/') !== -1 || search.indexOf('&p=/') !== -1) {
          var params = search.slice(1).split('&');
          var path = '';
          var query = '';
          for (var i = 0; i < params.length; i++) {
            if (params[i].startsWith('p=/')) path = '/' + params[i].slice(3).replace(/~and~/g, '&');
            else if (params[i].startsWith('q=')) query = '?' + params[i].slice(2).replace(/~and~/g, '&');
          }
          if (path) history.replaceState(null, null, location.pathname.split('/').slice(0, 2).join('/') + path + query + location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
